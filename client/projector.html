<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Máy chiếu - Triết Học Arena</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Projector chỉnh nhỏ - phần lớn dùng style.css */
    body { font-size: 16px; }
    body.projector .panel { color: var(--text-on-marble); }
  </style>
</head>
<body class="projector">
  <div class="container wide">
    <h1 class="banner-title">Triết Học Arena</h1>
    <p class="banner-sub">⚔ Đấu trường trí tuệ · Năm phe phái ⚔</p>

    <!-- Thanh HP 5 đội -->
    <div class="teams-row" id="teams-row"></div>

    <div class="proj-grid">
      <div>
        <!-- Người đang thi đấu -->
        <div class="panel">
          <h2 id="round-title">Chờ bắt đầu...</h2>
          <div class="vs-chosen" id="chosen"></div>
        </div>

        <!-- Câu hỏi -->
        <div class="panel" id="q-panel">
          <div class="row" style="justify-content:space-between;align-items:center">
            <h2>Câu hỏi</h2>
            <div class="proj-timer" id="timer">--</div>
          </div>
          <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
          <p class="big-q" id="q-text" style="margin-top:16px">---</p>
          <div class="answers" id="q-options"></div>
        </div>

        <!-- Thông báo tấn công -->
        <div class="panel hidden center" id="attack-panel">
          <h2 id="attack-text"></h2>
        </div>
      </div>

      <!-- Bảng xếp hạng cá nhân -->
      <div>
        <div class="panel">
          <h2>🏆 BXH cá nhân</h2>
          <div id="leaderboard"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/projector.js"></script>
</body>
</html>
