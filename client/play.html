<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chơi - Triết Học Arena</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- B1: Form tham gia -->
  <div id="join-screen" class="container">
    <h1 class="banner-title" style="font-size:36px">Tham Gia Đấu Trường</h1>
    <p class="banner-sub"><span class="gr">Εἴσοδος</span> · Lối vào đền</p>
    <div class="panel">
      <label>Tên học giả</label>
      <input id="name" maxlength="16" placeholder="Nhập tên của bạn...">

      <label>Chọn phe phái</label>
      <div id="team-pick" class="team-pick"></div>

      <button id="join-btn" class="gold" style="width:100%;margin-top:22px;padding:16px;font-size:14px">Bước vào sảnh chờ 🏛️</button>
    </div>
  </div>

  <!-- B2: Sảnh chờ + game -->
  <div id="game-screen" class="container hidden">
    <div class="row" style="justify-content:space-between;align-items:center">
      <h2 id="status-label" style="margin:0">Sảnh chờ</h2>
      <div id="me-info" style="font-size:11px;font-family:'Cinzel',serif;letter-spacing:.08em;text-transform:uppercase"></div>
    </div>

    <!-- Thanh máu 5 đội (hiển thị cả ở sảnh chờ và trong game) -->
    <div id="team-hp" class="team-hp-row"></div>

    <canvas id="lobby-canvas" width="900" height="500"></canvas>

    <!-- Banner đếm ngược tới vòng tiếp theo -->
    <div id="next-round-banner" class="next-round-banner hidden">
      <span id="next-round-text">⏳ Vòng tiếp theo bắt đầu sau <b>5s</b>…</span>
    </div>

    <!-- Khu vực trả lời câu hỏi -->
    <div id="question-box" class="panel hidden" style="margin-top:16px">
      <div class="row" style="justify-content:space-between">
        <h3 id="q-round"></h3>
        <span class="timer" id="q-timer">--</span>
      </div>
      <div class="timer-bar"><div class="timer-fill" id="q-timer-fill" style="width:100%"></div></div>
      <p id="q-text" style="margin:14px 0;font-style:italic;font-size:18px;color:var(--ink)"></p>
      <div class="answers" id="q-answers"></div>
      <p id="q-wait" class="center hidden" style="margin-top:14px;color:var(--gold-dark);font-style:italic">Đã ghi nhận — chờ phán quyết...</p>
    </div>

    <!-- Thông báo xem -->
    <div id="spectate-box" class="panel hidden center" style="margin-top:16px">
      <p id="spectate-msg" style="font-style:italic;color:var(--ink-soft)">Bạn đang quan sát vòng này — hãy cổ vũ phe mình! 👀</p>
    </div>
  </div>

  <!-- Joystick cảm ứng -->
  <div id="joystick" class="hidden"><div class="stick"></div></div>

  <!-- Reaction bar: tim / cuoi / like -->
  <div id="reaction-bar" class="reaction-bar hidden">
    <button class="reaction-btn" data-react="heart">❤️</button>
    <button class="reaction-btn" data-react="smile">😊</button>
    <button class="reaction-btn" data-react="like">👍</button>
  </div>

  <!-- Layer chứa emoji bay lên khi người khác reaction -->
  <div id="fx-layer" class="fx-layer"></div>

  <!-- Overlay công bố đội thắng vòng + chọn đội để tấn công -->
  <div id="winner-overlay" class="winner-overlay hidden">
    <div id="winner-card" class="winner-card">
      <div id="winner-badge" class="winner-badge">🏆 CHIẾN THẮNG 🏆</div>
      <div id="winner-char" class="winner-char"></div>
      <div id="winner-team" class="winner-team"></div>
      <div id="winner-time" class="winner-time"></div>

      <div id="winner-attack-section" class="winner-attack-section hidden">
        <div class="greek-divider"></div>
        <p class="winner-attack-label">🔥 Chọn phe để tấn công:</p>
        <div class="row" id="winner-attack-targets" style="justify-content:center"></div>
      </div>

      <!-- Cảnh giao chiến: nhân vật đội thắng tung chiêu vào nhân vật đội bị chọn -->
      <div id="winner-battle" class="winner-battle hidden">
        <div class="winner-battle-row">
          <div class="battle-side">
            <div id="battle-attacker" class="battle-char"></div>
            <div id="battle-attacker-name" class="battle-name"></div>
          </div>
          <div id="battle-impact" class="battle-impact">💥</div>
          <div class="battle-side">
            <div id="battle-target" class="battle-char"></div>
            <div id="battle-target-name" class="battle-name"></div>
          </div>
        </div>
        <p id="battle-result" class="battle-result"></p>
      </div>

      <p id="winner-wait-msg" class="winner-wait-msg hidden"></p>
    </div>
  </div>

  <!-- Bục vinh danh + pháo hoa khi trận đấu kết thúc -->
  <div id="champion-overlay" class="champion-overlay hidden">
    <div class="fireworks-layer" id="fireworks-layer"></div>
    <div class="champion-title">🏆 NHÀ VÔ ĐỊCH 🏆</div>
    <div class="podium-row" id="podium-row"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/play.js"></script>
</body>
</html>
